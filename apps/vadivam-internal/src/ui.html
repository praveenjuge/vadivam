<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vadivam Internal</title>
    <style>/* INJECT_UI_STYLES */</style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <span class="monogram" aria-hidden="true">V</span>
        <h1>Vadivam utilities</h1>
        <span class="internal">Internal</span>
      </header>

      <p id="summary" class="summary">Reading this file and the local icon index…</p>

      <section class="toolkit" aria-label="Icon utilities">
        <div class="tool-row">
          <span class="tool-name">Icon library</span>
          <span id="library-meta" class="tool-meta">Reading icons</span>
          <button id="sync-library" type="button" disabled>Create</button>
        </div>
        <div class="tool-row">
          <label for="count">Create frames</label>
          <input id="count" type="number" min="1" max="100" step="1" value="20" />
          <button id="generate" type="button" disabled>Create</button>
        </div>
        <div class="tool-row">
          <span class="tool-name">Arrange icons</span>
          <span class="tool-meta">A–Z · 20/row</span>
          <button id="arrange" type="button">Arrange</button>
        </div>
        <div class="tool-row">
          <span class="tool-name">Audit icons</span>
          <span class="tool-meta">Check + rename</span>
          <button id="audit" type="button">Audit</button>
        </div>
        <div class="tool-row">
          <span class="tool-name">Refresh queue</span>
          <span class="tool-meta">Scan file</span>
          <button id="refresh" type="button">Refresh</button>
        </div>
      </section>

      <section class="toolbar" aria-label="Utility status">
        <p id="status" role="status">Loading ranked icons…</p>
      </section>

      <ol id="results" aria-label="Plugin results"></ol>
    </main>
    <script>/* INJECT_UI_SCRIPT */</script>
  </body>
</html>
