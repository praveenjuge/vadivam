name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Cache integration app dependencies
        uses: actions/cache@v4
        with:
          path: |
            tests/integration/*/node_modules
            tests/integration/nextjs/.next/cache
          key: integration-${{ runner.os }}-${{ hashFiles('tests/integration/*/bun.lock') }}
          restore-keys: |
            integration-${{ runner.os }}-

      - name: Validate release version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: bun run release:validate "$TAG_NAME"

      - name: Test
        timeout-minutes: 15
        run: bun run test

      - name: Publish and verify packages
        run: bun run release:publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          previous_tag=$(git describe --tags --abbrev=0 "$TAG_NAME^" 2>/dev/null || true)
          bun scripts/release-notes.mjs "$previous_tag" "$TAG_NAME" > release-notes.md
          gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md --generate-notes --verify-tag
