name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const tag = process.env.TAG_NAME.replace(/^v/, "");
          const files = [
            "package.json",
            "packages/vadivam/package.json",
            "packages/vadivam-react/package.json"
          ];
          for (const file of files) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            if (pkg.version !== tag) {
              throw new Error(`${file} version ${pkg.version} does not match tag ${process.env.TAG_NAME}`);
            }
          }
          NODE

      - name: Test
        run: bun run test

      - name: Publish vadivam
        working-directory: packages/vadivam
        run: npm publish --access public

      - name: Publish vadivam-react
        working-directory: packages/vadivam-react
        run: npm publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes --verify-tag
