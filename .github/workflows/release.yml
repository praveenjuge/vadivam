name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Cache integration app dependencies
        uses: actions/cache@v4
        with:
          path: |
            tests/integration/*/node_modules
            tests/integration/nextjs/.next/cache
          key: integration-${{ runner.os }}-${{ hashFiles('tests/integration/*/bun.lock') }}
          restore-keys: |
            integration-${{ runner.os }}-

      - name: Validate release version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: bun run release:validate "$TAG_NAME"

      - name: Test
        run: bun run test

      - name: Publish and verify packages
        run: bun run release:publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          icon_count=$(find icons -type f -name '*.svg' | wc -l | tr -d ' ')
          notes="Ships ${icon_count} Vadivam icons across [SVG](https://www.npmjs.com/package/vadivam), [React](https://www.npmjs.com/package/vadivam-react), [React Native](https://www.npmjs.com/package/vadivam-react-native), [Vue](https://www.npmjs.com/package/vadivam-vue), [Svelte](https://www.npmjs.com/package/vadivam-svelte), [Solid](https://www.npmjs.com/package/vadivam-solid), [Angular](https://www.npmjs.com/package/vadivam-angular), [Astro](https://www.npmjs.com/package/vadivam-astro), and [Preact](https://www.npmjs.com/package/vadivam-preact)."
          gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "$notes" --generate-notes --verify-tag
