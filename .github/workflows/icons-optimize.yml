name: Icons & Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: icons-${{ github.ref }}
  cancel-in-progress: false

jobs:
  optimize-and-release:
    runs-on: ubuntu-latest
    # Skip the workflow's own bot commits so we don't loop.
    if: |
      !startsWith(github.event.head_commit.message, 'chore(icons):') &&
      !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # RELEASE_TOKEN is a PAT (or GitHub App token) with contents:write.
          # It is required for the tag push to trigger release.yml.
          # Without it we fall back to GITHUB_TOKEN, which still lets the
          # workflow commit and tag, but release.yml will not be triggered.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Cache integration app dependencies
        uses: actions/cache@v4
        with:
          path: |
            tests/integration/*/node_modules
            tests/integration/nextjs/.next/cache
          key: integration-${{ runner.os }}-${{ hashFiles('tests/integration/*/bun.lock') }}
          restore-keys: |
            integration-${{ runner.os }}-

      - name: Optimize icons
        run: bun run icons:optimize

      - name: Check icons
        run: bun run icons:check

      - name: Render preview
        run: bun run icons:preview

      - name: Render OG image
        run: bun run icons:og

      - name: Test
        run: bun run test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit normalized icons
        id: normalize
        run: |
          if [ -n "$(git status --porcelain icons apps/docs/public/preview.png apps/docs/public/og.png)" ]; then
            git add icons apps/docs/public/preview.png apps/docs/public/og.png
            git commit -m "chore(icons): normalize via icons:optimize"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect releasable changes since last release
        id: changes
        run: |
          last_tag=$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            echo "No previous release tag; will release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git diff --name-only "$last_tag" HEAD -- icons packages scripts package.json bun.lock)" ]; then
            echo "Icons or packages changed since $last_tag."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No releasable changes since $last_tag; skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions and tag
        if: steps.changes.outputs.changed == 'true'
        id: bump
        run: |
          version=$(bun scripts/bump-version.mjs)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          git add package.json packages/*/package.json README.md packages/*/README.md
          git commit -m "chore(release): v$version"
          git tag -a "v$version" -m "v$version"

      - name: Push commits and tag
        if: steps.normalize.outputs.committed == 'true' || steps.changes.outputs.changed == 'true'
        run: git push --follow-tags origin "HEAD:${GITHUB_REF#refs/heads/}"
